name: ci
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: no-stub gate
        run: |
          if grep -REn "unimplemented!\(|todo!\(" src; then
            echo "no-stub gate failed"; exit 1
          fi
          echo "no-stub gate passed"
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test
      - name: fmt
        run: cargo fmt --check